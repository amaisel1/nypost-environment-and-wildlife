<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENERATE — Environment & Wildlife</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Libre+Franklin:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0d0d0d;
            --paper: #ffffff;
            --red: #c41e1e;
            --tan: #e0d8c4;
            --mid: #7a7060;
            --rule: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Libre Franklin', sans-serif;
            font-weight: 300;
            min-height: 100vh;
        }

        /* MASTHEAD */
        .masthead {
            border-bottom: 4px double var(--rule);
            padding: 20px 48px 16px;
            background: var(--paper);
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: end;
            gap: 16px;
        }

        .masthead a { text-decoration: none; color: inherit; }

        .masthead-kicker {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--red);
            display: block;
            margin-bottom: 6px;
        }

        .masthead h1 {
            font-family: 'Libre Franklin', sans-serif;
            font-size: clamp(18px, 2.4vw, 28px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.01em;
        }

        .masthead-dateline {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            color: var(--mid);
            letter-spacing: 0.1em;
            text-align: right;
            line-height: 1.8;
        }

        /* NAV */
        .topnav {
            background: var(--rule);
            display: flex;
            padding: 0 48px;
            border-bottom: 3px solid var(--red);
        }

        .topnav a {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #999;
            text-decoration: none;
            padding: 11px 22px;
            border-right: 1px solid #2e2e2e;
            transition: color 0.15s, background 0.15s;
            display: block;
        }

        .topnav a:first-child { border-left: 1px solid #2e2e2e; }
        .topnav a:hover { color: var(--paper); background: #222; }
        .topnav a.active { color: white; background: var(--red); border-color: var(--red); }

        /* MAIN */
        main {
            width: 100%;
        }

        .iframe-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 40px 48px;
        }

        iframe {
            width: 100%;
            max-width: 1200px;
            height: 850px;
            border: 1px solid var(--tan);
            background: white;
            display: block;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 24px 20px;
            border-top: 3px double var(--rule);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--mid);
        }

        footer a { color: var(--red); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .masthead { padding: 16px 24px 12px; }
            .topnav { padding: 0 24px; }
            .iframe-container { padding: 24px; }
            iframe { height: 900px; }
        }
    </style>
</head>
<body>

<div class="masthead">
    <div>
        <a href="https://amaisel1.github.io/nypost-environment-and-wildlife/index.html">
            <span class="masthead-kicker">The New York Post's</span>
            <h1>Environment &amp; Wildlife</h1>
        </a>
    </div>
    <div class="masthead-dateline">
        Article Archive<br>
        Headline Generator<br>
    </div>
</div>

<div class="topnav">
    <a href="https://amaisel1.github.io/nypost-environment-and-wildlife/search.html">Search</a>
    <a href="https://amaisel1.github.io/nypost-environment-and-wildlife/aboutproject.html">About</a>
    <a class="active" href="https://amaisel1.github.io/nypost-environment-and-wildlife/generate.html">Generate</a>
</div>

<main>
    <div class="iframe-container">
        <iframe
            src="https://alapoodle-nypost-headline-generator.hf.space"
            title="NYPost Headline Generator"
            allow="clipboard-write"
        ></iframe>
    </div>
</main>

<footer>A project by <a href="https://amaisel1.github.io">Alana Maisel</a> &nbsp;·&nbsp; 2026</footer>

</body>
</html>
